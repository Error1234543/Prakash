services:
  - type: web
    name: gujarati-ocr-bot
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # Set manually in Render dashboard
      - key: AICREDITS_API_KEY
        sync: false   # Set manually in Render dashboard
